service: papermark
image: papermark

servers:
  web:
    hosts:
      - <%= `op read "op://Papermark/Server IP/ip"`.strip %>

proxy:
  ssl: true
  host: dataroom.syntaxia.com
  app_port: 3000
  healthcheck:
    path: /api/health
    interval: 10

deploy_timeout: 300

registry:
  server: localhost:5555

env:
  secret:
    - NEXTAUTH_SECRET
    - POSTGRES_PRISMA_URL
    - POSTGRES_PRISMA_URL_NON_POOLING
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - SMTP_HOST
    - SMTP_PORT
    - SMTP_USER
    - SMTP_PASSWORD
    - SMTP_FROM_ADDRESS
    - TINYBIRD_TOKEN
    - TINYBIRD_BASE_URL
    - UPSTASH_REDIS_REST_URL
    - UPSTASH_REDIS_REST_TOKEN
    - UPSTASH_REDIS_REST_LOCKER_URL
    - UPSTASH_REDIS_REST_LOCKER_TOKEN
    - TRIGGER_SECRET_KEY
    - NEXT_PRIVATE_UPLOAD_ACCESS_KEY_ID
    - NEXT_PRIVATE_UPLOAD_SECRET_ACCESS_KEY
    - NEXT_PRIVATE_UPLOAD_BUCKET
    - NEXT_PRIVATE_UPLOAD_REGION
    - NEXT_PRIVATE_UPLOAD_DISTRIBUTION_HOST
    - NEXT_PRIVATE_DOCUMENT_PASSWORD_KEY
    - NEXT_PRIVATE_VERIFICATION_SECRET
    - INTERNAL_API_KEY
  clear:
    NODE_ENV: production
    SELF_HOSTED: "1"
    NEXTAUTH_URL: https://dataroom.syntaxia.com
    NEXT_PUBLIC_BASE_URL: https://dataroom.syntaxia.com
    NEXT_PUBLIC_MARKETING_URL: https://dataroom.syntaxia.com
    NEXT_PUBLIC_APP_BASE_HOST: dataroom.syntaxia.com
    NEXT_PUBLIC_UPLOAD_TRANSPORT: s3
    TRIGGER_API_URL: https://api.trigger.dev
    ALLOWED_EMAIL_DOMAIN: syntaxia.com
    NEXT_PUBLIC_ALLOWED_EMAIL_DOMAIN: syntaxia.com

accessories:
  db:
    image: postgres:17
    host: <%= `op read "op://Papermark/Server IP/ip"`.strip %>
    port: "127.0.0.1:5432:5432"
    env:
      secret:
        - POSTGRES_USER
        - POSTGRES_DB
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    host: <%= `op read "op://Papermark/Server IP/ip"`.strip %>
    cmd: redis-server --appendonly yes
    directories:
      - redis-data:/data
  redis-locker:
    image: redis:7-alpine
    host: <%= `op read "op://Papermark/Server IP/ip"`.strip %>
    cmd: redis-server --appendonly yes
    directories:
      - redis-locker-data:/data
  srh:
    image: hiett/serverless-redis-http:latest
    host: <%= `op read "op://Papermark/Server IP/ip"`.strip %>
    env:
      clear:
        SRH_MODE: env
        SRH_CONNECTION_STRING: redis://papermark-redis:6379
        SRH_TOKEN: <%= `op read "op://Papermark/Redis SRH/SRH_TOKEN"`.strip %>
  srh-locker:
    image: hiett/serverless-redis-http:latest
    host: <%= `op read "op://Papermark/Server IP/ip"`.strip %>
    env:
      clear:
        SRH_MODE: env
        SRH_CONNECTION_STRING: redis://papermark-redis-locker:6379
        SRH_TOKEN: <%= `op read "op://Papermark/Redis SRH/SRH_LOCKER_TOKEN"`.strip %>

ssh:
  user: deploy
  keys: ["~/.ssh/papermark_prod"]
  keys_only: true

builder:
  arch: amd64
